name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-22.04
            rust-target: ""
            tauri-args: "--bundles appimage,deb,rpm"
          - name: Windows x64
            runner: windows-latest
            rust-target: ""
            tauri-args: "--bundles nsis,msi"
          - name: macOS Apple Silicon
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app,dmg"
          - name: macOS Intel
            runner: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin --bundles app,dmg"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          tauriScript: bunx tauri
          args: ${{ matrix.tauri-args }}
