name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-26.04
            rust-target: ""
            tauri-args: "--bundles appimage,deb,rpm"
          - name: Windows x64
            runner: windows-latest
            rust-target: ""
            tauri-args: "--bundles nsis,msi"
          - name: macOS Apple Silicon
            runner: macos-latest
            rust-target: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin --bundles app,dmg"
          - name: macOS Intel
            runner: macos-latest
            rust-target: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin --bundles app,dmg"

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Sync app version from release tag
        run: bun scripts/sync-release-version.mjs "${{ github.event.release.tag_name }}"

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Resolve Tauri bundle args
        id: tauri-args
        shell: bash
        run: |
          args='${{ matrix.tauri-args }}'
          if [[ '${{ runner.os }}' == 'Windows' && '${{ github.event.release.tag_name }}' == *-* ]]; then
            # MSI rejects non-numeric semver pre-release identifiers like alpha.1.
            # Keep pre-release Windows artifacts semver-aligned by publishing NSIS only.
            args='--bundles nsis'
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app and upload release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ github.event.release.id }}
          tagName: ${{ github.event.release.tag_name }}
          tauriScript: bunx tauri
          args: ${{ steps.tauri-args.outputs.args }}

      - name: Patch and re-upload Linux AppImage runtime hook
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          app_dir="src-tauri/target/release/bundle/appimage/GitEye.AppDir"
          app_image="GitEye_${version}_amd64.AppImage"

          cp src-tauri/bundle/linuxdeploy-plugin-gtk.sh "$app_dir/apprun-hooks/linuxdeploy-plugin-gtk.sh"
          chmod +x "$app_dir/apprun-hooks/linuxdeploy-plugin-gtk.sh"

          curl -L --fail -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$app_dir" "$app_image"

          gh release upload "${{ github.event.release.tag_name }}" "$app_image" --clobber

  finalize-assets:
    name: Verify release artifact versions
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify release assets match tag version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_RELEASE_ID: ${{ github.event.release.id }}
        run: bun scripts/verify-release-assets.mjs "${{ github.event.release.tag_name }}"
